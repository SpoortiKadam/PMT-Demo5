

<!DOCTYPE html>
<html>
<head>
    <style>
        /*Styling for paragraph tag only */
        p {
            text-align:left;
            color: red;
        } 

        /* Styling for paragraph using id*/
        #para1 {
            text-align:justify;
            color:blue;
        }

        /* class for all tags*/
        .center {
            text-align: center;
            color:brown;
        }
  
        /* class for a specific stag*/
        p.center {
            text-align: center;
            color:aqua;
        }

        /*specific tag and a class name*/
        p.large {
            font-size: 200%;
        }

        /* universal class*/
        * {
            font-family: 'Lucida Sans';
            color:black;
        }

        h1, h2, p {
            text-align:right;
            color:blueviolet;
        }
  
    </style>
</head>
<body>
    <p id="para1">
        Hello..
    </p>
    <h4>
        Hi..
    </h4>
</body>
</html>
